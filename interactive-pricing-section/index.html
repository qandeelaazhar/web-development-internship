<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pricing Section</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
           <h1>Pricing Plan</h1>
           <button class="btn active" id="monthlyBtn">Monthly</button>
           <button class="btn" id="annualBtn">Annual</button>
        </div>

        <div class="card-containers">
            <div class="card">
                <h3>Basic</h3>
                <p class="price">
                    <span class="amount">$10</span>
                    <span class="period">/month</span>
                </p>
                <button class="select-btn">Select Plan</button>
            </div>

            <div class="card">
                <h3>Professional</h3>
                <p class="price">
                    <span class="amount">$20</span>
                    <span class="period">/month</span>
                </p>
                <button class="select-btn">Select Plan</button>
            </div>

            <div class="card">
                <h3>Enterprise</h3>
                <p class="price">
                    <span class="amount">$30</span>
                    <span class="period">/month</span>
                </p>
                <button class="select-btn">Select Plan</button>
            </div>
        </div>
        <p class="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
